# Re-upload a corrected latest.json for an existing release (fixes bad installer URLs in the manifest).
name: Repair updater manifest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. nightly-26156660512 or v0.0.24)'
        required: true
        type: string

jobs:
  repair:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Repair latest.json on release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: node scripts/repair-updater-manifest.mjs
