# Nightly channel: prerelease builds (GitHub tag name contains `nightly`).
# The app’s **Nightly** update track picks the newest matching prerelease.
#
# Version: each run from `main` (schedule or workflow_dispatch) bumps PATCH (0.0.1)
# via `scripts/bump-version.mjs` and commits back to main. Tag-only runs use the
# repo version at that tag without bumping.
#
# Ways to publish:
# - Push a tag matching `nightly*` — release uses that tag name.
# - Weekday schedule (`nightly-<run_id>`) or Actions → Nightly → Run workflow.

name: Nightly

on:
  push:
    tags:
      - 'nightly*'
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (default main)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
      NIGHTLY_TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('nightly-{0}', github.run_id) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || 'main') || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare app version (bump PATCH on branch builds)
        id: ver
        shell: bash
        run: |
          set -e
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VER=$(node -p "require('./package.json').version")
          else
            VER=$(node scripts/bump-version.mjs nightly)
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (nightly prerelease)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.NIGHTLY_TAG }}
          releaseName: 'Wingosy Launcher Nightly v${{ steps.ver.outputs.version }} — ${{ env.NIGHTLY_TAG }}'
          releaseBody: |
            App version **v${{ steps.ver.outputs.version }}** (PATCH bump for nightly).

            Automated **nightly** pre-release. May be unstable.

            - **Tag push:** push a tag matching `nightly*` to publish without waiting for the schedule.
            - **Stable** channel: [Latest release](https://github.com/yash-1o1/wingosy-launcher/releases/latest) (`v*` tags, not prerelease).
            - **Beta** channel: run the *Beta* workflow.
          prerelease: true
          releaseDraft: false

      - name: Commit version bump to main
        if: success() && github.ref == 'refs/heads/main' && github.ref_type != 'tag'
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git commit -m "chore(release): v${VERSION} nightly [skip ci]"
          git push origin HEAD:main
