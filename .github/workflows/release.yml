# Build Windows installers and attach them to a GitHub Release.
#
# Recommended: push an annotated tag after bumping versions (see CONTRIBUTING / repo docs).
# Optional: Actions → Release → Run workflow → enter an existing tag (e.g. v0.2.0).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build (e.g. v0.2.0). Create and push the tag first.'
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wingosy-launcher_windows_x64

    runs-on: ${{ matrix.platform }}

    env:
      # Tag push: ref is refs/tags/v* ; manual run: ref is a branch, use the typed-in tag.
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Enable Corepack (pinned npm from package.json)
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'Wingosy Launcher ${{ env.RELEASE_TAG }}'
          releaseBody: |
            Assets below include the Windows installer (`.exe`) and MSI where configured.

            Add a root `CHANGELOG.md` and link it here in this workflow if you want a changelog section.
          releaseDraft: true
          prerelease: false
