# Stable channel: Windows installers attached to a **non-prerelease** GitHub Release.
#
# The git tag sets the app version (e.g. v2.0.0 → 2.0.0): CI runs `scripts/set-version.mjs`
# so installers match the tag. This is a MAJOR-style release relative to prior betas/nightlies
# (you normally tag after `npm run version:bump -- release` on main, or set the tag to the
# desired X.0.0 manually — see CONTRIBUTING.md).
#
# Do not use this workflow for nightly/beta tags — those are built by nightly.yml / beta.yml.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build (e.g. v0.2.0). Create and push the tag first.'
        required: true
        type: string

jobs:
  build:
    # Exclude pre-release tracks from the stable pipeline (tag still matches v*).
    if: ${{ !contains(github.ref_name, 'nightly') && !contains(github.ref_name, 'beta') }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wingosy-launcher_windows_x64

    runs-on: ${{ matrix.platform }}

    env:
      # Tag push: ref is refs/tags/v* ; manual run: ref is a branch, use the typed-in tag.
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Enable Corepack (pinned npm from package.json)
        run: corepack enable

      - name: Sync app version from release tag
        shell: bash
        run: |
          set -e
          TAG="${{ env.RELEASE_TAG }}"
          VER="${TAG#v}"
          node scripts/set-version.mjs "$VER"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'Wingosy Launcher ${{ env.RELEASE_TAG }}'
          releaseBody: |
            **Windows installers**

            - **NSIS** — `*x64-setup.exe` (graphical installer; this is the `.exe` asset)
            - **WiX** — `*.msi` (optional MSI installer)

            Add a root `CHANGELOG.md` and link it here in this workflow if you want a changelog section.
          releaseDraft: false
          prerelease: false
